<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="bg-black p-3">
        <h1 class="text-primary">Mijn Bootstrap Showcase</h1>
        <p class="text-white">Een pagina met verschillende Bootstrap componenten.</p>
    </div>
    <div class="container">

        <h2>Navigatie</h2>
        <ul class="nav">
            <li class="nav-item">
                <a class="nav-link" href="#">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Afbeeldingen</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Contact</a>
            </li>
        </ul>

        <h2>Afbeeldingen</h2>
        <img src="https://picsum.photos/900/300" alt="voorbeeld afbeelding" class="img-fluid rounded">

        <h2>Formulier</h2>
        <form class="col-md-4">
            <label for="name" class="form-label">Naam:</label>
            <input type="text" id="name" class="form-control">
            <label for="email" class="form-label">Email:</label>
            <input type="email" id="email" class="form-control">
            <label for="message" class="form-label">Bericht:</label>
            <textarea id="message" class="form-control"></textarea>
            <button type="submit" class="btn btn-primary">Verstuur</button>
            <button type="reset" class="btn btn-danger rounded">Reset</button>
        </form>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
